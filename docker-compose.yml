services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 4398:4398
    depends_on:
      - neo4j

  neo4j:
    image: neo4j:5.26-community
    container_name: neo4j-memory
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-research_pass}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - mcp-network
    healthcheck:
      test:
        [
          "CMD",
          "cypher-shell",
          "-u",
          "neo4j",
          "-p",
          "${NEO4J_PASSWORD:-research_pass}",
          "RETURN 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

networks:
  mcp-network:
    driver: bridge
